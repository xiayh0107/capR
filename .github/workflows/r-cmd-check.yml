name: R CMD check

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  check:
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          # R 4.1.0 checks the hard-dependency core only: current CRAN
          # binaries of several optional Suggests (Matrix-dependent stacks)
          # no longer support R < 4.4, so vignettes are skipped and every
          # Suggests-dependent test self-skips.
          - {os: ubuntu-latest, r: '4.1.0',
             deps: '"hard"',
             force_suggests: 'false',
             check_args: 'c("--no-manual", "--as-cran", "--ignore-vignettes")',
             build_args: 'c("--no-manual", "--no-build-vignettes")'}
          - {os: ubuntu-latest, r: 'release'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: ${{ matrix.config.force_suggests || 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: ${{ matrix.config.deps || '"all"' }}
          extra-packages: any::rcmdcheck, any::testthat
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: ${{ matrix.config.check_args || 'c("--no-manual", "--as-cran")' }}
          build_args: ${{ matrix.config.build_args || 'c("--no-manual", "--compact-vignettes=gs+qpdf")' }}
      - name: Upload check logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: check-logs-${{ matrix.config.os }}-R-${{ matrix.config.r }}
          path: check
          if-no-files-found: ignore
