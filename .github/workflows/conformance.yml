name: CAP-Digest conformance

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
      - name: Install capR
        run: R CMD INSTALL .
      - name: Run offline L0-L3 fixtures
        shell: Rscript {0}
        run: |
          library(capR)
          dir.create("conformance-artifacts")
          report <- cap_run_fixtures(
            report = "conformance-artifacts/capr-conformance.json"
          )
          print(report)
          if (!report$ok) quit(status = 1L)
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: capr-conformance
          path: conformance-artifacts
