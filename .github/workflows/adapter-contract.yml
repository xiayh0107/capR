name: Adapter contract

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
      - name: Install capR
        shell: Rscript {0}
        run: install.packages(".", repos = NULL, type = "source")
      - name: Run adapter contract tests
        shell: Rscript {0}
        run: |
          library(capR)
          testthat::test_dir(
            "tests/testthat",
            filter = "adapter|registry|policy|provenance",
            stop_on_failure = TRUE
          )
