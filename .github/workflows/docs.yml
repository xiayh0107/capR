name: Documentation and hygiene

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::roxygen2, any::testthat
          needs: check
      - name: Check generated documentation
        shell: Rscript {0}
        run: |
          roxygen2::roxygenise()
          status <- system("git diff --exit-code -- NAMESPACE man", intern = FALSE)
          if (status != 0L) quit(status = status)
      - name: Check local documentation links
        run: Rscript tools/check-doc-links.R
      - name: Check whitespace
        run: git diff --check HEAD^ HEAD
