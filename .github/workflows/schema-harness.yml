name: Draft 2020-12 schema harness

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/schema-harness/requirements.txt
      - run: python -m pip install -r tools/schema-harness/requirements.txt
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
      - name: Install capR and generate canonical artifacts
        run: |
          R CMD INSTALL .
          Rscript tools/generate-fixture-artifacts.R schema-artifacts
      - name: Validate Draft 2020-12 schemas and artifacts
        run: |
          python tools/schema-harness/validate.py \
            --artifacts schema-artifacts \
            --report schema-artifacts/schema-report.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: capr-schema-harness
          path: schema-artifacts

