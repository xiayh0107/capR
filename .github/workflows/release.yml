name: Prepare release evidence

on:
  workflow_dispatch:
    inputs:
      release:
        description: Release label such as capR-v1.0.0
        required: true
        type: string

permissions: read-all

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/schema-harness/requirements.txt
      - run: python -m pip install -r tools/schema-harness/requirements.txt
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
      - name: Generate release evidence without tagging
        run: Rscript tools/release-artifacts.R "${{ inputs.release }}"
      - name: Validate generated manifest
        run: >
          Rscript tools/validate-release-manifest.R --allow-untracked
          "release-artifacts/${{ inputs.release }}"
      - uses: actions/upload-artifact@v7
        with:
          name: "${{ inputs.release }}"
          path: "release-artifacts/${{ inputs.release }}"
